# Maven
# Build your Java project and run tests with Apache Maven.

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
# Step 1: Force the agent to use Java 17 first
- task: JavaToolInstaller@0
  displayName: 'Install/Activate Java 17'
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'

# Step 2: Run the Maven build using the correct Java version
- task: Maven@3
  displayName: 'Maven Clean and Package'
  inputs:
    mavenPomFile: 'pom.xml'
    mavenOptions: '-Xmx3072m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.17'
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: 'package'

# Step 3: Copy the XML files (Runs even if tests fail!)
- task: CopyFiles@2
  displayName: 'Copy Raw Test XML to Staging'
  condition: succeededOrFailed() 
  inputs:
    SourceFolder: '$(system.defaultworkingdirectory)'
    Contents: '**/target/surefire-reports/*.xml'
    TargetFolder: '$(build.artifactstagingdirectory)/TestReports'

# Step 4: Publish the staging directory (Runs even if tests fail!)
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifacts'
  condition: succeededOrFailed()
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
