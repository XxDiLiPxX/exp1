# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- task: Maven@3
  env:
    # Restricts the JVM to 1GB to prevent the Azure OOM Killer from terminating the process
    MAVEN_OPTS: '-Xmx1024m -XX:MaxMetaspaceSize=256m'
  inputs:
    mavenPomFile: 'pom.xml'
    # 'package' compiles and jars the code; '-DskipTests' skips the execution of tests
    goals: 'clean package -DskipTests'
    # --batch-mode prevents Maven from hanging on interactive prompts
    options: '--batch-mode --errors'
    publishJUnitResults: false
    jdkVersionOption: '1.17' # Ensure this matches your project's Java version
